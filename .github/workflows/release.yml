name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...

  package:
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: leaserage-linux-amd64
            ext: tar.gz
          - goos: linux
            goarch: arm64
            asset: leaserage-linux-arm64
            ext: tar.gz
          - goos: windows
            goarch: amd64
            asset: leaserage-windows-amd64
            ext: zip
          - goos: windows
            goarch: arm64
            asset: leaserage-windows-arm64
            ext: zip
          - goos: darwin
            goarch: amd64
            asset: leaserage-darwin-amd64
            ext: tar.gz
          - goos: darwin
            goarch: arm64
            asset: leaserage-darwin-arm64
            ext: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build ${{ matrix.asset }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -eu
          mkdir -p dist/package
          if [ "${GOOS}" = "windows" ]; then
            go build -trimpath -ldflags "-s -w" -o dist/package/leaserage.exe ./cmd/leaserage
            (cd dist/package && zip -q "../${{ matrix.asset }}.zip" leaserage.exe)
          else
            go build -trimpath -ldflags "-s -w" -o dist/package/leaserage ./cmd/leaserage
            tar -czf "dist/${{ matrix.asset }}.tar.gz" -C dist/package leaserage
          fi
      - name: Smoke executable on Linux amd64
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: ./dist/package/leaserage --help
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}.${{ matrix.ext }}

  publish:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Add installer scripts and checksums
        run: |
          cp scripts/install.sh scripts/install.ps1 scripts/uninstall.sh scripts/uninstall.ps1 dist/
          (cd dist && sha256sum * > checksums.txt)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
