name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
      - name: Build release assets
        run: |
          set -eu
          mkdir -p dist/package
          for target in \
            linux/amd64/tar.gz \
            linux/arm64/tar.gz \
            windows/amd64/zip \
            windows/arm64/zip \
            darwin/amd64/tar.gz \
            darwin/arm64/tar.gz
          do
            goos="$(printf '%s' "$target" | cut -d/ -f1)"
            goarch="$(printf '%s' "$target" | cut -d/ -f2)"
            ext="$(printf '%s' "$target" | cut -d/ -f3)"
            rm -rf dist/package
            mkdir -p dist/package
            if [ "$goos" = "windows" ]; then
              GOOS="$goos" GOARCH="$goarch" go build -o dist/package/leaserage.exe ./cmd/leaserage
              (cd dist/package && zip "../leaserage-${goos}-${goarch}.zip" leaserage.exe)
            else
              GOOS="$goos" GOARCH="$goarch" go build -o dist/package/leaserage ./cmd/leaserage
              tar -czf "dist/leaserage-${goos}-${goarch}.tar.gz" -C dist/package leaserage
            fi
          done
          cp scripts/install.sh scripts/install.ps1 scripts/uninstall.sh scripts/uninstall.ps1 dist/
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
